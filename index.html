<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>EQUEST | Professional Communication & Soft Skills</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://unpkg.com/scrollreveal"></script>
  
  <style>
    :root {
      --primary: #00ffcc; 
      --bg-body: #050505;
      --card-bg: #0f0f0f;
      --glass: rgba(255, 255, 255, 0.05);
      --accent-gradient: linear-gradient(45deg, #00ffcc, #0099ff);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
    body { background-color: var(--bg-body); color: #ffffff; line-height: 1.6; overflow-x: hidden; scroll-behavior: smooth; }

    /* Custom Interactive Mouse Glow */
    body::before {
      content: '';
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: radial-gradient(circle at var(--x, 50%) var(--y, 50%), rgba(0, 255, 204, 0.08) 0%, transparent 50%);
      z-index: -1; pointer-events: none;
    }

    /* --- Navigation (Updated with Stylized Text Logo) --- */
    header {
      position: fixed; top: 0; width: 100%; padding: 15px 8%;
      background: rgba(5, 5, 5, 0.95); backdrop-filter: blur(20px);
      display: flex; justify-content: space-between; align-items: center;
      z-index: 2000; border-bottom: 1px solid var(--glass);
    }

    .logo-text {
        font-family: 'Space Grotesk', sans-serif;
        font-weight: 700;
        font-size: 2.2rem;
        letter-spacing: -3px;
        text-transform: uppercase;
        color: var(--primary);
        text-decoration: none;
        display: inline-block;
        position: relative;
        transition: 0.5s ease;
        filter: drop-shadow(0 0 10px rgba(0, 255, 204, 0.3));
    }

    .logo-text::before {
        content: attr(data-text);
        position: absolute; left: 0; top: 0;
        width: 100%; height: 100%;
        color: rgba(0,255,204,0.1);
        transform: translate(2px, 2px);
        z-index: -1;
    }

    .logo-text:hover {
        transform: scale(1.05);
        color: #fff;
        text-shadow: 0 0 20px var(--primary);
        letter-spacing: -1px;
    }

    nav ul { display: flex; list-style: none; gap: 30px; }
    nav a { text-decoration: none; color: #888; font-size: 0.85rem; font-weight: 600; text-transform: uppercase; transition: 0.3s; letter-spacing: 1px; }
    nav a:hover { color: var(--primary); text-shadow: 0 0 10px var(--primary); }

    /* --- Hero Section (Updated with Shimmer Animation) --- */
    .hero {
      height: 100vh; display: flex; flex-direction: column; 
      justify-content: center; align-items: center; text-align: center;
      padding: 0 10%; position: relative;
    }

    .hero h1 { 
      font-size: clamp(3rem, 10vw, 6.5rem); font-weight: 800; line-height: 0.9; 
      margin-bottom: 25px; letter-spacing: -4px;
      /* Main Shimmer Animation Effect */
      background: linear-gradient(-45deg, #fff, #444, #fff, #444);
      background-size: 400% 400%;
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      animation: shimmerText 5s ease-in-out infinite;
    }

    @keyframes shimmerText {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
    }
